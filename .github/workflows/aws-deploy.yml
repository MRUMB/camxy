name: Build & Deploy Backend

on:
  push:
    branches:
      - main   # change if your main branch has a different name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Compile backend
      - name: Compile backend
        run: npx tsc

      # 5️⃣ Copy compiled files to EC2
      - name: Deploy compiled JS to EC2
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/**"
          target: "/home/ubuntu/camxy/dist"

      # 6️⃣ Restart PM2 on EC2
      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            pm2 stop camxy-backend || true
            pm2 start /home/ubuntu/camxy/dist/server.js --name camxy-backend
            pm2 save
