name: Deploy Backend to EC2

on:
  push:
    branches:
      - main  # or your backend branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Compile backend
      - name: Compile backend
        run: npx tsc -p tsconfig.backend.json

      # 5. Copy compiled files to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "dist/**"
          target: "/home/ubuntu/camxy/dist"

      # 6. Restart PM2 on EC2
      - name: Restart PM2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            pm2 stop camxy-backend || true
            pm2 start /home/ubuntu/camxy/dist/server.js --name camxy-backend
            pm2 save
